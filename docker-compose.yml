services:
  stream-equities:
    build: .
    container_name: bot_trading-stream-equities-1
    command: python -m bot stream --market equities --mode ${BOT_MODE:-advisory}
    env_file: .env
    environment:
      MARKET: equities
      DATA_DIR: /app/data
    volumes:
      - bot_data:/app/data
    restart: unless-stopped

  stream-crypto:
    build: .
    container_name: bot_trading-stream-crypto-1
    command: python -m bot stream --market crypto --mode ${BOT_MODE:-advisory}
    env_file: .env
    environment:
      MARKET: crypto
      DATA_DIR: /app/data
    volumes:
      - bot_data:/app/data
    restart: unless-stopped

  backfill-equities:
    build: .
    profiles: ["jobs"]
    command: python -m bot backfill --market equities --days ${BACKFILL_DAYS:-30}
    env_file: .env
    environment:
      MARKET: equities
      DATA_DIR: /app/data
    volumes:
      - bot_data:/app/data

  backfill-crypto:
    build: .
    profiles: ["jobs"]
    command: python -m bot backfill --market crypto --days ${BACKFILL_DAYS:-8}
    env_file: .env
    environment:
      MARKET: crypto
      DATA_DIR: /app/data
    volumes:
      - bot_data:/app/data

  trainer-equities:
    build: .
    profiles: ["jobs"]
    command: python -m bot train --market equities
    env_file: .env
    environment:
      MARKET: equities
      DATA_DIR: /app/data
    volumes:
      - bot_data:/app/data

  trainer-crypto:
    build: .
    profiles: ["jobs"]
    command: python -m bot train --market crypto
    env_file: .env
    environment:
      MARKET: crypto
      DATA_DIR: /app/data
    volumes:
      - bot_data:/app/data

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: bot_trading-dashboard-1
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATA_DIR: /app/data
    volumes:
      - bot_data:/app/data
    restart: unless-stopped

volumes:
  bot_data:
