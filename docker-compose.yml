services:
  stream:
    build: .
    container_name: bot_trading-stream-1
    command: python -m bot stream --mode ${BOT_MODE:-advisory}
    env_file: .env
    environment:
      DATA_DIR: /app/data
      KILL_SWITCH_FILE: /app/data/KILL
    volumes:
      - bot_data:/app/data
    restart: unless-stopped

  backfill:
    build: .
    profiles: ["jobs"]
    command: python -m bot backfill --days ${BACKFILL_DAYS:-30}
    env_file: .env
    environment:
      DATA_DIR: /app/data
    volumes:
      - bot_data:/app/data

  trainer:
    build: .
    profiles: ["jobs"]
    command: python -m bot train
    env_file: .env
    environment:
      DATA_DIR: /app/data
    volumes:
      - bot_data:/app/data

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: bot_trading-dashboard-1
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATA_DIR: /app/data
      KILL_SWITCH_FILE: /app/data/KILL
    volumes:
      - bot_data:/app/data
    restart: unless-stopped

volumes:
  bot_data:
